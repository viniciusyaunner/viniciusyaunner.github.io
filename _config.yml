# ── Build settings ─────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-seo-tag

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - Gemfile.rb
  - README.md
  - LICENSE.md
  - .gitignore
  - "**/*.Zone.Identifier"
  - "**/*#Uf03a*"
